<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎈🎂 عيـد ميـلاد سعـيد 🎉🤍</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Tajawal:wght@300;400;500;700;800&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================ */
    /*          RESET & BASE STYLES                 */
    /* ============================================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-family: 'Tajawal', 'Outfit', sans-serif;
      color: #fff;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
      padding: 20px;
      padding-bottom: 60px;
      direction: rtl;
    }

    /* ============================================ */
    /*     ANIMATED GRADIENT BACKGROUND             */
    /* ============================================ */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        135deg,
        #0f0015 0%,
        #1a0a2e 15%,
        #2d1148 30%,
        #44185c 45%,
        #5c1a5e 55%,
        #3d0f3d 70%,
        #1f0a2e 85%,
        #0a0012 100%
      );
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      z-index: -3;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      25% { background-position: 100% 0%; }
      50% { background-position: 100% 100%; }
      75% { background-position: 0% 100%; }
      100% { background-position: 0% 50%; }
    }

    /* ============================================ */
    /*         FLOATING STARS / PARTICLES           */
    /* ============================================ */
    .stars-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -2;
      overflow: hidden;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 70%);
      animation: twinkle var(--duration) ease-in-out infinite;
      opacity: 0;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: var(--max-opacity); transform: scale(1); }
    }

    /* ============================================ */
    /*        FLOATING HEARTS                       */
    /* ============================================ */
    .floating-hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      bottom: -80px;
      font-size: var(--size);
      animation: floatUp var(--duration) linear infinite;
      animation-delay: var(--delay);
      opacity: 0;
      filter: blur(0.5px);
    }

    @keyframes floatUp {
      0% {
        opacity: 0;
        transform: translateY(0) translateX(0) rotate(0deg) scale(0.5);
      }
      10% {
        opacity: 0.7;
        transform: translateY(-10vh) translateX(10px) rotate(15deg) scale(1);
      }
      50% {
        opacity: 0.5;
        transform: translateY(-50vh) translateX(-20px) rotate(-10deg) scale(0.9);
      }
      90% {
        opacity: 0.2;
        transform: translateY(-90vh) translateX(15px) rotate(20deg) scale(0.7);
      }
      100% {
        opacity: 0;
        transform: translateY(-110vh) translateX(0) rotate(0deg) scale(0.5);
      }
    }

    /* ============================================ */
    /*           MAIN TITLE                         */
    /* ============================================ */
    .main-title {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(2.2rem, 7vw, 4rem);
      font-weight: 800;
      text-align: center;
      margin-top: 30px;
      margin-bottom: 15px;
      background: linear-gradient(135deg, #FFD700, #FFA500, #FF6B9D, #FFD700);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmerText 4s ease-in-out infinite, titleFloat 3s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.4));
      position: relative;
    }

    @keyframes shimmerText {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes titleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .main-title .emoji-decor {
      -webkit-text-fill-color: initial;
      font-size: clamp(1.8rem, 5vw, 3rem);
    }

    .subtitle {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(0.9rem, 2.5vw, 1.15rem);
      font-weight: 300;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 4px;
      margin-bottom: 30px;
      animation: fadeInUp 1.5s ease-out 0.5s both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ============================================ */
    /*       GLASSMORPHISM COVER CARD               */
    /* ============================================ */
    .cover {
      position: relative;
      width: 90%;
      max-width: 520px;
      margin: 10px auto 20px;
      padding: 40px 30px;
      cursor: pointer;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      animation: coverPulse 3s ease-in-out infinite, fadeInUp 1s ease-out 1s both;
      overflow: hidden;
    }

    .cover::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(
        circle at 30% 50%,
        rgba(255, 107, 157, 0.08) 0%,
        transparent 50%
      );
      pointer-events: none;
    }

    .cover::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.3), transparent);
    }

    @keyframes coverPulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1); }
      50% { box-shadow: 0 8px 40px rgba(255, 107, 157, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.15); }
    }

    .cover:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 48px rgba(255, 107, 157, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .cover:active {
      transform: scale(0.98);
    }

    .cover-emoji {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 15px;
      animation: bounceEmoji 2s ease-in-out infinite;
    }

    @keyframes bounceEmoji {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-10px) rotate(5deg); }
      75% { transform: translateY(-5px) rotate(-3deg); }
    }

    .cover-text {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(1rem, 3vw, 1.25rem);
      font-weight: 500;
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.9;
    }

    .cover-hint {
      display: block;
      margin-top: 18px;
      font-size: 0.8rem;
      color: rgba(255, 215, 0, 0.7);
      letter-spacing: 2px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .cover.hidden {
      transform: translateY(60px) scale(0.9) rotateX(10deg);
      opacity: 0;
      pointer-events: none;
    }

    /* ============================================ */
    /*      GLASSMORPHISM GREETING CARD             */
    /* ============================================ */
    #greetingCard {
      display: none;
      width: 90%;
      max-width: 560px;
      margin: 10px auto 25px;
      padding: 45px 35px;
      border-radius: 28px;
      text-align: center;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow:
        0 8px 40px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.1),
        inset 0 -1px 0 rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
      animation: cardReveal 1s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    @keyframes cardReveal {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.9);
        backdrop-filter: blur(0px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        backdrop-filter: blur(24px);
      }
    }

    #greetingCard::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    }

    #greetingCard::after {
      content: '';
      position: absolute;
      top: -100%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(
        ellipse at 50% 0%,
        rgba(255, 107, 157, 0.06) 0%,
        transparent 50%
      );
      pointer-events: none;
    }

    .greeting-cake-emoji {
      font-size: 4rem;
      display: block;
      margin-bottom: 20px;
      animation: cakeFloat 3s ease-in-out infinite;
    }

    @keyframes cakeFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.05); }
    }

    .greeting-text {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(1rem, 2.8vw, 1.2rem);
      font-weight: 400;
      color: rgba(255, 255, 255, 0.9);
      line-height: 2.1;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .greeting-text .line {
      display: block;
      opacity: 0;
      transform: translateY(15px);
      animation: lineReveal 0.7s ease-out forwards;
    }

    @keyframes lineReveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .greeting-divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.5), transparent);
      margin: 25px auto;
      border-radius: 2px;
    }

    .greeting-footer {
      margin-top: 10px;
      font-size: 1.8rem;
      opacity: 0;
      animation: fadeInUp 0.8s ease-out 3.5s both;
    }

    /* ============================================ */
    /*   PLAY SONG BUTTON (داخل البطاقة)           */
    /* ============================================ */
    .play-btn-wrapper {
      margin-top: 25px;
      opacity: 0;
      transform: translateY(15px);
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      z-index: 2;
    }

    .play-btn-wrapper.show {
      opacity: 1;
      transform: translateY(0);
    }

    .play-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(0.95rem, 2.5vw, 1.1rem);
      font-weight: 500;
      color: #fff;
      background: linear-gradient(135deg, rgba(255, 107, 157, 0.3), rgba(147, 51, 234, 0.3));
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 50px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 20px rgba(255, 107, 157, 0.15);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      letter-spacing: 0.5px;
      position: relative;
      overflow: hidden;
      animation: btnGlow 3s ease-in-out infinite;
    }

    @keyframes btnGlow {
      0%, 100% { box-shadow: 0 4px 20px rgba(255, 107, 157, 0.15); }
      50% { box-shadow: 0 4px 30px rgba(255, 107, 157, 0.4); }
    }

    .play-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transition: left 0.6s;
    }

    .play-btn:hover::before {
      left: 100%;
    }

    .play-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255, 107, 157, 0.35);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .play-btn:active {
      transform: scale(0.97);
    }

    .play-btn .btn-icon {
      font-size: 1.3rem;
      animation: musicPulse 1.5s ease-in-out infinite;
    }

    @keyframes musicPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    /* ============================================ */
    /*      PREMIUM MUSIC PLAYER                    */
    /* ============================================ */
    .player-controls {
      display: none;
      width: 90%;
      max-width: 420px;
      margin: 20px auto;
      padding: 0;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 12px 48px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      opacity: 0;
      transform: translateY(-30px);
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: center;
      position: relative;
      direction: ltr;
      overflow: hidden;
    }

    .player-controls::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      z-index: 1;
    }

    .player-controls.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* === الجزء العلوي: الخلفية المتوهجة + معلومات الأغنية === */
    .player-top {
      position: relative;
      padding: 28px 28px 20px;
      background: linear-gradient(180deg, rgba(255, 107, 157, 0.08) 0%, transparent 100%);
    }

    .player-top::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 15%;
      right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    }

    /* أيقونة الموسيقى الدوارة */
    .player-disc {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255, 107, 157, 0.2), rgba(147, 51, 234, 0.2));
      border: 2px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      box-shadow:
        0 0 20px rgba(255, 107, 157, 0.15),
        inset 0 0 15px rgba(255, 107, 157, 0.05);
      position: relative;
    }

    .player-disc.spinning {
      animation: discSpin 3s linear infinite;
    }

    @keyframes discSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* removed disc center hole */

    .player-label {
      font-family: 'Tajawal', sans-serif;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 6px;
      direction: rtl;
    }

    .player-song-name {
      font-family: 'Tajawal', sans-serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 4px;
      direction: rtl;
    }

    .player-artist {
      font-family: 'Tajawal', sans-serif;
      font-size: 0.8rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.4);
      direction: rtl;
    }

    /* === شريط التقدم === */
    .player-progress-section {
      padding: 16px 28px 0;
    }

    .progress {
      width: 100%;
      height: 5px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 5px;
      margin: 0;
      cursor: pointer;
      position: relative;
      transition: height 0.2s;
      direction: ltr;
      overflow: visible;
    }

    .progress:hover {
      height: 7px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #FF6B9D, #c084fc, #FFD700);
      background-size: 200% 100%;
      animation: progressShimmer 3s ease infinite;
      border-radius: 5px;
      transition: width 0.3s linear;
      position: relative;
    }

    @keyframes progressShimmer {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .progress-bar::after {
      content: '';
      position: absolute;
      right: -6px;
      top: 50%;
      transform: translateY(-50%) scale(0);
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(255, 107, 157, 0.5), 0 0 4px rgba(255,255,255,0.3);
      transition: transform 0.2s ease;
    }

    .progress:hover .progress-bar::after {
      transform: translateY(-50%) scale(1);
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      padding-bottom: 4px;
    }

    .time-display {
      font-family: 'Outfit', sans-serif;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      direction: ltr;
    }

    /* === Visualizer المتحرك === */
    .visualizer {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
      height: 20px;
      margin-top: 2px;
    }

    .viz-bar {
      width: 3px;
      background: linear-gradient(180deg, #FF6B9D, #c084fc);
      border-radius: 2px;
      transition: height 0.15s ease;
      animation: vizPause 0.5s ease infinite alternate;
    }

    .viz-bar.active {
      animation: vizDance var(--speed) ease-in-out infinite alternate;
    }

    @keyframes vizDance {
      0% { height: var(--min-h); opacity: 0.6; }
      100% { height: var(--max-h); opacity: 1; }
    }

    @keyframes vizPause {
      0%, 100% { height: 3px; opacity: 0.3; }
    }

    /* === أزرار التحكم === */
    .player-bottom {
      padding: 14px 28px 24px;
    }

    .controls-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
    }

    .ctrl-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.75);
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ctrl-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.18);
      transform: scale(1.1);
      color: #fff;
    }

    .ctrl-btn.play-pause {
      width: 60px;
      height: 60px;
      font-size: 1.5rem;
      background: linear-gradient(135deg, rgba(255, 107, 157, 0.35), rgba(147, 51, 234, 0.35));
      border: 1px solid rgba(255, 107, 157, 0.25);
      box-shadow:
        0 4px 20px rgba(255, 107, 157, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .ctrl-btn.play-pause:hover {
      box-shadow:
        0 6px 30px rgba(255, 107, 157, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.15);
      transform: scale(1.08);
    }

    .ctrl-btn.play-pause.is-playing {
      animation: playBtnPulse 2s ease-in-out infinite;
    }

    @keyframes playBtnPulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(255, 107, 157, 0.2); }
      50% { box-shadow: 0 4px 30px rgba(255, 107, 157, 0.45); }
    }

    /* ============================================ */
    /*          CONFETTI CANVAS                     */
    /* ============================================ */
    #confettiCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    /* ============================================ */
    /*          RESPONSIVE                          */
    /* ============================================ */
    /* ===== الهواتف الصغيرة (أقل من 380px) ===== */
    @media (max-width: 380px) {
      body {
        padding: 10px;
        padding-bottom: 30px;
      }

      .main-title {
        font-size: 1.8rem;
        margin-top: 15px;
        margin-bottom: 8px;
      }

      .main-title .emoji-decor {
        font-size: 1.4rem;
      }

      .subtitle {
        font-size: 0.8rem;
        margin-bottom: 18px;
        letter-spacing: 2px;
      }

      .cover {
        padding: 25px 18px;
        border-radius: 18px;
        margin: 8px auto 15px;
      }

      .cover-emoji {
        font-size: 2.5rem;
        margin-bottom: 10px;
      }

      .cover-text {
        font-size: 0.95rem;
        line-height: 1.8;
      }

      #greetingCard {
        padding: 28px 18px;
        border-radius: 18px;
        margin: 8px auto 15px;
      }

      .greeting-cake-emoji {

  <script>
    // ===========================
    // شاشة التحميل
    // ===========================
    window.addEventListener('load', function() {
      setTimeout(function() {
        document.getElementById('pageLoader').classList.add('hide');
      }, 1800);
    });

    // ===========================
    // إنشاء النجوم العائمة
    // ===========================
    (function generateStars() {
      const container = document.getElementById('starsContainer');
      const count = 80;
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');

    // ===========================
    // إنشاء القلوب العائمة
    // ===========================
    (function generateHearts() {

    // ===========================
    // أسطر نص المعايدة
    // ===========================
    const greetingLines = [

      "يا أحلى وأحسن وحدة بآشور 🤍",
      "",
      "طبعاً هذا الشي قليل بحقج",
      "وتستاهلين شي أحلى من هيج،",
      "بس تدرين وقت ابد ماعندي 😅",
      "",
      "Happy Birthday",
      "لألطف إنسانة 🎉🫶"
    ];

    // ===========================
    // كشف بطاقة المعايدة
    // ===========================
    function revealText() {
      const cover = document.getElementById('coverCard');
      const card = document.getElementById('greetingCard');
      const playBtnWrapper = document.getElementById('playBtnWrapper');

      cover.classList.add('hidden');

      setTimeout(function() {
        cover.style.display = 'none';
        card.style.display = 'block';

        // إظهار النص سطر بسطر
        const textContainer = document.getElementById('greetingText');
        greetingLines.forEach(function(line, index) {
          const span = document.createElement('span');
          span.classList.add('line');
          if (line === "") {
            span.innerHTML = '<br>';
          } else {
            span.textContent = line;
          }
          span.style.animationDelay = (index * 0.15 + 0.3) + 's';
          textContainer.appendChild(span);
        });

        // إظهار زر تشغيل الأغنية بعد انتهاء ظهور النص
        const totalDelay = greetingLines.length * 0.15 + 1;
        setTimeout(function() {
          playBtnWrapper.classList.add('show');
        }, totalDelay * 1000);

        // مؤشر التمرير إذا المحتوى أطول من الشاشة
        setTimeout(function() {
          if (document.body.scrollHeight > window.innerHeight) {
            document.getElementById('scrollHint').classList.add('visible');
            setTimeout(function() {
              document.getElementById('scrollHint').classList.remove('visible');
            }, 4000);
          }
        }, 2000);

        // بدء تأثير الكونفيتي
        startConfetti();
      }, 800);
    }

    // ===========================
    // وظائف مشغل الموسيقى المحسّن
    // ===========================
    function enableControls() {
      const controls = document.getElementById("controls");
      controls.style.display = "block";
      setTimeout(function() {
        controls.classList.add("visible");
      }, 100);
    }

    // تشغيل/إيقاف الـ Visualizer
    function setVisualizerState(playing) {
      const bars = document.querySelectorAll('.viz-bar');
      bars.forEach(function(bar) {
        if (playing) {
          bar.classList.add('active');
        } else {
          bar.classList.remove('active');
        }
      });
    }

    // تشغيل/إيقاف دوران الأيقونة
    function setDiscState(playing) {
      const disc = document.getElementById('playerDisc');
      if (playing) {
        disc.classList.add('spinning');
      } else {
        disc.classList.remove('spinning');
      }
    }

    // تحديث حالة زر التشغيل
    function updatePlayState(playing) {
      const btn = document.getElementById('playPauseBtn');
      btn.textContent = playing ? '⏸' : '▶';
      if (playing) {
        btn.classList.add('is-playing');
      } else {
        btn.classList.remove('is-playing');
      }
      setVisualizerState(playing);
      setDiscState(playing);
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return m + ":" + (s < 10 ? "0" + s : s);
    }

    function playSong() {
      const song = document.getElementById("song");
      song.play();
      updatePlayState(true);
      enableControls();
      // إخفاء زر التشغيل بسلاسة
      const wrapper = document.getElementById('playBtnWrapper');
      wrapper.style.opacity = '0';
      wrapper.style.transform = 'translateY(10px)';
      setTimeout(function() { wrapper.style.display = 'none'; }, 500);
      sendTelegramMessage("🎶 تم تشغيل الأغنية.");
    }

    function updateProgress() {
      const song = document.getElementById("song");
      const progressBar = document.getElementById("progress-bar");
      const currentTimeEl = document.getElementById("currentTime");
      const totalTimeEl = document.getElementById("totalTime");

      if (!isNaN(song.duration)) {
        currentTimeEl.textContent = formatTime(song.currentTime);
        totalTimeEl.textContent = formatTime(song.duration);
        progressBar.style.width = (song.currentTime / song.duration) * 100 + "%";
      }
    }

    function togglePlay() {
      const song = document.getElementById("song");
      if (song.paused) {
        song.play();
        updatePlayState(true);
      } else {
        song.pause();
        updatePlayState(false);
      }
    }

    function rewind() {
      const song = document.getElementById("song");
      if (!isNaN(song.duration)) {
        song.currentTime = Math.max(0, song.currentTime - 5);
      }
    }

    function forward() {
      const song = document.getElementById("song");
      if (!isNaN(song.duration)) {
        song.currentTime = Math.min(song.duration, song.currentTime + 5);
      }
    }

    function seekSong(event) {
      const song = document.getElementById("song");
      const progressContainer = event.currentTarget;
      if (!isNaN(song.duration)) {
        const rect = progressContainer.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const ratio = x / rect.width;
        song.currentTime = ratio * song.duration;
      }
    }

    // مراقبة انتهاء الأغنية
    document.getElementById("song").addEventListener("ended", function() {
      updatePlayState(false);
    });

    // ===========================
    // تكامل بوت تلجرام
    // ===========================
    const telegramBotToken = "7890478414:AAGkrQ7HwgdU6ppweqOpfvygwmeI1tyJvKw";
    const telegramChatId = "651561282";

    function sendTelegramMessage(message) {
      fetch(`https://api.telegram.org/bot${telegramBotToken}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: telegramChatId, text: message }),
        keepalive: true
      });
    }

    function formatDate(date) {
      let day = date.getDate();
      let month = date.getMonth() + 1;
      let year = date.getFullYear();
      let hours = date.getHours();
      let minutes = date.getMinutes();
      let seconds = date.getSeconds();
      let period = hours >= 12 ? "م" : "ص";
      hours = hours % 12;
      if (hours === 0) hours = 12;
      minutes = minutes < 10 ? "0" + minutes : minutes;
      seconds = seconds < 10 ? "0" + seconds : seconds;
      return `${day}/${month}/${year} ${hours}:${minutes}:${seconds} ${period}`;
    }

    // تسجيل وقت الدخول
    let loginTime = new Date();
    let userAgentInfo = navigator.userAgent;
    sendTelegramMessage(`🚀 دخول جديد للموقع!\n📅 التاريخ: ${formatDate(loginTime)}\n🖥 الجهاز: ${userAgentInfo}`);

    // إشعار عند إيقاف الموسيقى
    document.getElementById("song").addEventListener("pause", function() {
      sendTelegramMessage("🎵 تم إيقاف الموسيقى.");
    });

    // ===========================
    // اكتشاف مغادرة الموقع
    // ===========================
    let exitMessageSent = false;

    function sendExitMessage(message) {
      if (exitMessageSent) return;
      exitMessageSent = true;
      const payload = JSON.stringify({ chat_id: telegramChatId, text: message });
      const blob = new Blob([payload], { type: 'application/json' });
      navigator.sendBeacon(`https://api.telegram.org/bot${telegramBotToken}/sendMessage`, blob);
    }

    function sendExit() {
      if (exitMessageSent) return;
      const logoutTime = new Date();
      const durationSeconds = Math.round((logoutTime - loginTime) / 1000);
      const minutes = Math.floor(durationSeconds / 60);
      const seconds = durationSeconds % 60;
      const message = `📤 المستخدم غادر الموقع\n⏳ مدة البقاء: ${minutes} دقيقة و ${seconds} ثانية`;
      sendExitMessage(message);
    }

    window.addEventListener("beforeunload", sendExit);
    window.addEventListener("pagehide", sendExit);
    window.addEventListener("unload", sendExit);
    document.addEventListener("visibilitychange", function() {
      if (document.visibilityState === "hidden") sendExit();
    });
    window.addEventListener("blur", function() {
      if (document.visibilityState === "hidden") sendExit();
    });

    // ===========================
    // اكتشاف لقطة الشاشة
    // ===========================
    let screenshotMessageSent = false;
    function notifyScreenshot() {
      if (screenshotMessageSent) return;
      screenshotMessageSent = true;
      const screenshotTime = new Date();
      sendTelegramMessage(`📸 تم التقاط لقطة شاشة!\n📅 التاريخ: ${formatDate(screenshotTime)}\n🖥 الجهاز: ${userAgentInfo}`);
      setTimeout(function() { screenshotMessageSent = false; }, 3000);
    }

    document.addEventListener('touchend', function() {
      const now = new Date().getTime();
      const delta = now - (this._lastTouchEndTime || now);
      this._lastTouchEndTime = now;
      if (delta < 20) {
        setTimeout(function() {
          if (document.visibilityState === 'hidden') notifyScreenshot();
        }, 50);
      }
    });

    document.addEventListener('keyup', function(e) {
      if (
        (e.key === 'PrintScreen') ||
        (e.key === '3' && e.metaKey && e.shiftKey) ||
        (e.key === '4' && e.metaKey && e.shiftKey) ||
        (e.key === 'PrtScn') ||
        (e.keyCode === 44)
      ) {
        notifyScreenshot();
      }
    });

    if (window.devicePixelRatio) {
      const defaultPixelRatio = window.devicePixelRatio;
      window.addEventListener('resize', function() {
        if (window.devicePixelRatio !== defaultPixelRatio) {
          notifyScreenshot();
          setTimeout(function() {
            if (window.devicePixelRatio === defaultPixelRatio) notifyScreenshot();
          }, 500);
        }
      });
    }

    function checkScreenshot() {
      const originalPixelRatio = window.devicePixelRatio;
      let changed = false;
      const events = ['mousedown', 'mouseup', 'keydown', 'keyup'];
      events.forEach(function(event) {
        document.addEventListener(event, function() {
          setTimeout(function() {
            if (window.devicePixelRatio !== originalPixelRatio && !changed) {
              changed = true;
              notifyScreenshot();
            } else if (window.devicePixelRatio === originalPixelRatio && changed) {
              changed = false;
            }
          }, 50);
        });
      });
    }
    checkScreenshot();

    // ===========================
    // تأثير الكونفيتي
    // ===========================
    function startConfetti() {
      const canvas = document.getElementById('confettiCanvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const colors = [
        '#FF6B9D', '#FFD700', '#9333EA', '#FF4081',
        '#00E5FF', '#76FF03', '#FF6E40', '#E040FB',
        '#FFAB40', '#18FFFF', '#FF1744', '#D500F9'
      ];

      const particles = [];
      const particleCount = 180;

      for (let i = 0; i < particleCount; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          r: Math.random() * 5 + 2,
          d: Math.random() * particleCount,
          color: colors[Math.floor(Math.random() * colors.length)],
          tilt: Math.floor(Math.random() * 10) - 10,
          tiltAngleIncremental: (Math.random() * 0.07) + 0.05,
          tiltAngle: 0,
          shape: Math.random() > 0.5 ? 'rect' : 'circle'
        });
      }

      let angle = 0;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(function(p) {
          ctx.beginPath();
          ctx.fillStyle = p.color;
          if (p.shape === 'circle') {
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
          } else {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.tiltAngle * Math.PI / 180);
            ctx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r);
            ctx.restore();
          }
        });
        update();
      }

      function update() {
        angle += 0.01;
        particles.forEach(function(p, index) {
          p.tiltAngle += p.tiltAngleIncremental;
          p.y += (Math.cos(angle + p.d) + 1 + p.r / 2) / 2;
          p.x += Math.sin(angle) * 0.8;
          p.tilt = Math.sin(p.tiltAngle) * 15;

          if (p.y > canvas.height) {
            particles[index] = {
              x: Math.random() * canvas.width,
              y: -20,
              r: p.r,
              d: p.d,
              color: p.color,
              tilt: p.tilt,
              tiltAngleIncremental: p.tiltAngleIncremental,
              tiltAngle: p.tiltAngle,
              shape: p.shape
            };
          }
        });
      }

      function animate() {
        draw();
        requestAnimationFrame(animate);
      }

      window.addEventListener('resize', function() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });

      animate();
    }
  </script>
